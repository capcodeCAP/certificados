<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Certificados CapCode Junior</title>

<style>

body{
font-family:system-ui;
max-width:900px;
margin:auto;
padding:0;
background:#f6f7fb;
}

header{
background:linear-gradient(135deg,#8c1d2d,#c62839);
color:white;
padding:22px;
text-align:center;
font-size:1.6rem;
font-weight:700;
letter-spacing:1px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
margin-bottom:30px;
}

.container{
padding:20px;
text-align:center;
}

input{
padding:10px;
font-size:16px;
width:260px;
}

button{
padding:10px 18px;
font-size:16px;
cursor:pointer;
margin-left:10px;
}

.resultado{
margin-top:30px;
text-align:left;
}

.file{
padding:8px;
margin-bottom:10px;
background:#ffe6eb;
border-left:5px solid #8c1d2d;
border-radius:6px;
}

.file a{
color:#8c1d2d;
font-weight:600;
text-decoration:none;
}

.file a:hover{
text-decoration:underline;
}

footer{
margin-top:50px;
padding:18px;
text-align:center;
font-size:0.95rem;
color:white;
background:linear-gradient(135deg,#8c1d2d,#c62839);
}

</style>
</head>

<body>

<header>
📜 Certificados CapCode
</header>

<div class="container">

<input
type="text"
id="identificador"
placeholder="Digite CPF, RG ou matrícula"
/>

<button onclick="buscarCertificados()">
Buscar
</button>

<div id="resultado" class="resultado"></div>

</div>


<script>

const API_KEY =
"AIzaSyBHcb9dhR3ctvWLADAJTnD3ZxW8IrZ-NXM";

const ROOT_FOLDER =
"1XONWEtVSlIK6KH5AhTgDwH_JeW_hIiwS";


async function listarConteudo(folderId){

const url =
`https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false
&fields=files(id,name,mimeType,webViewLink)
&orderBy=name
&key=${API_KEY}`;

const resposta = await fetch(url);

return await resposta.json();

}


async function buscarRecursivo(folderId, nomePasta, identificador, encontrados){

try{

const dados = await listarConteudo(folderId);

for(const item of dados.files){

if(item.mimeType === "application/vnd.google-apps.folder"){

await buscarRecursivo(
item.id,
nomePasta + "/" + item.name,
identificador,
encontrados
);

}else{

if(
item.name.toLowerCase().endsWith(".pdf") &&
item.name.replace(/\D/g,"").includes(identificador)
){

encontrados.push({
nome:item.name,
pasta:nomePasta,
link:item.webViewLink
});

}

}

}

}catch(e){

console.log("Erro ao acessar:", nomePasta);

}

}


async function buscarCertificados(){

let identificador =
document
.getElementById("identificador")
.value
.replace(/\D/g,"");

if(!identificador){

alert("Digite CPF, RG ou matrícula (somente números).");

return;

}

const resultado =
document.getElementById("resultado");

resultado.innerHTML="🔎 Buscando certificados...";

let encontrados=[];

await buscarRecursivo(
ROOT_FOLDER,
"Certificados",
identificador,
encontrados
);


if(encontrados.length===0){

resultado.innerHTML=
"❌ Nenhum certificado encontrado.";

return;

}


resultado.innerHTML="";

encontrados.forEach(cert=>{

resultado.innerHTML+=`
<div class="file">
📂 Pasta: <b>${cert.pasta}</b><br>
📄 <a href="${cert.link}" target="_blank">
${cert.nome}
</a>
</div>
`;

});

}

</script>


<footer>
<strong>Desenvolvido e mantido pelo projeto capCode</strong><br>
Laboratório 212.2 — UFSJ / CAP
</footer>

</body>
</html>
