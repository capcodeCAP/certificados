<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Certificados CapCode Junior</title>

<style>

body{
font-family:system-ui;
max-width:900px;
margin:auto;
padding:20px;
background:#f6f7fb;
}

h1{
text-align:center;
color:#8c1d2d;
margin-bottom:30px;
}

/* estilo pasta */
.folder{
cursor:pointer;
padding:12px;
background:#ffe6eb;
margin:8px 0;
border-radius:10px;
font-weight:600;
border-left:6px solid #8c1d2d;
transition:0.25s;
}

.folder:hover{
background:#ffd5dc;
transform:translateX(4px);
}

/* certificados */
.file{
margin-left:25px;
padding:4px 0;
}

.file a{
color:#8c1d2d;
font-weight:500;
text-decoration:none;
}

.file a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<h1>📜 Certificados CapCode Junior</h1>

<div id="drive-tree">
Carregando certificados...
</div>


<script>

const API_KEY =
"AIzaSyBHcb9dhR3ctvWLADAJTnD3ZxW8IrZ-NXM";

const ROOT_FOLDER =
"1XONWEtVSlIK6KH5AhTgDwH_JeW_hIiwS";


async function listarPastas(folderId, container){

try{

const url =
`https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false
&fields=files(id,name,mimeType,webViewLink)
&orderBy=name
&key=${API_KEY}`;

const resposta = await fetch(url);
const dados = await resposta.json();

container.innerHTML="";

const lista=document.createElement("ul");

for(const item of dados.files){

/* MOSTRAR APENAS PASTAS */
if(item.mimeType==="application/vnd.google-apps.folder"){

const li=document.createElement("li");

const pasta=document.createElement("div");

pasta.className="folder";

pasta.innerHTML="📂 "+item.name;

const sublista=document.createElement("div");

sublista.style.display="none";
sublista.style.marginLeft="20px";


pasta.onclick=async()=>{

if(sublista.dataset.loaded!=="true"){

sublista.innerHTML="Carregando...";

sublista.style.display="block";

await listarArquivos(item.id, sublista);

sublista.dataset.loaded="true";

pasta.innerHTML="📁 "+item.name;

}else{

sublista.style.display =
(sublista.style.display==="none")?"block":"none";

pasta.innerHTML =
(sublista.style.display==="block")
?"📁 "+item.name
:"📂 "+item.name;

}

};


li.appendChild(pasta);
li.appendChild(sublista);

lista.appendChild(li);

}

}

container.appendChild(lista);

}catch(e){

container.innerHTML="❌ Erro ao acessar Google Drive.";

}

}


async function listarArquivos(folderId, container){

try{

const url =
`https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false
&fields=files(id,name,webViewLink)
&orderBy=name
&key=${API_KEY}`;

const resposta = await fetch(url);
const dados = await resposta.json();

container.innerHTML="";

for(const item of dados.files){

/* IGNORA NOTEBOOK AUTOMATICAMENTE */
if(item.name.endsWith(".ipynb")) continue;

const div=document.createElement("div");

div.className="file";

div.innerHTML=
`📄 <a href="${item.webViewLink}" target="_blank">${item.name}</a>`;

container.appendChild(div);

}

}catch(e){

container.innerHTML="Erro ao carregar certificados.";

}

}


listarPastas(
ROOT_FOLDER,
document.getElementById("drive-tree")
);

</script>

</body>

</html>
