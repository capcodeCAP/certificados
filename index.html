<script>

const repo = "capcodeCAP/certificados";


async function listarConteudo(caminho=""){

    const resposta = await fetch(
        `https://api.github.com/repos/${repo}/contents/${caminho}`
    );

    return await resposta.json();

}


async function buscarRecursivo(caminho, identificador, encontrados){

    try{

        const itens = await listarConteudo(caminho);

        for(const item of itens){

            if(item.type === "dir"){

                await buscarRecursivo(
                    item.path,
                    identificador,
                    encontrados
                );

            }

            else if(
                item.type === "file" &&
                item.name.endsWith(".pdf") &&
                item.name.includes(identificador)
            ){

                encontrados.push({

                    nome: item.name,
                    pasta: item.path.substring(
                        0,
                        item.path.lastIndexOf("/")
                    ),
                    url: item.download_url

                });

            }

async function buscarCertificados(){

    let identificador = document
        .getElementById("identificador")
        .value
        .replace(/\D/g,"");


    if(!identificador){

        alert(
        "Digite CPF, RG ou matrícula (somente números)."
        );

        return;

    }


    const resultado = document.getElementById("resultado");

    resultado.innerHTML = "🔎 Buscando certificados...";


    let encontrados = [];


    await buscarRecursivo(
        "",
        identificador,
        encontrados
    );


    if(encontrados.length === 0){

        resultado.innerHTML =
        "❌ Nenhum certificado encontrado para este identificador.";

        return;

    }


    resultado.innerHTML = "";


    encontrados.forEach(cert => {

        resultado.innerHTML += `

        <div class="certificado">

        📂 Pasta: <b>${cert.pasta}</b><br>

        📄 <a href="${cert.url}" target="_blank">
        ${cert.nome}
        </a>

        </div>

        `;

    });

}

</script>
